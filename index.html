
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunar & Martian Frontier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background-color: #020408;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      user-select: none;
    }
    .font-orbitron {
      font-family: 'Orbitron', sans-serif;
    }
    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #020408 100%);
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.5;
      animation: twinkle var(--duration) infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Scanline effect */
    .scanlines {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 3px 100%;
      z-index: 100;
      pointer-events: none;
      opacity: 0.15;
    }

    /* 3D Prism Styles */
    .prism-container {
      transform-style: preserve-3d;
      position: absolute;
    }
    .prism-face {
      position: absolute;
      backface-visibility: visible;
    }
    .prism-top {
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      width: 104px;
      height: 120px;
      transform-style: preserve-3d;
    }
    .prism-side {
      width: 53px; 
      height: 25px; /* Thicker for 3D printed look */
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* Terrain Decorations */
    .terrain-crater {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,0,0,0.3);
      box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8), 1px 1px 2px rgba(255,255,255,0.1);
    }
    .terrain-crystal {
      position: absolute;
      width: 10px; height: 30px;
      background: linear-gradient(to top, #0ea5e9, #bae6fd);
      transform-style: preserve-3d;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }

    /* Dice 3D */
    .dice {
      width: 60px;
      height: 60px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .dice-face {
      position: absolute;
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #1e293b;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      color: #0f172a;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    }
    .face-1 { transform: rotateY(0deg) translateZ(30px); }
    .face-2 { transform: rotateY(90deg) translateZ(30px); }
    .face-3 { transform: rotateY(180deg) translateZ(30px); }
    .face-4 { transform: rotateY(-90deg) translateZ(30px); }
    .face-5 { transform: rotateX(90deg) translateZ(30px); }
    .face-6 { transform: rotateX(-90deg) translateZ(30px); }

    .rolling {
      animation: dice-roll 0.8s infinite linear;
    }
    @keyframes dice-roll {
      0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateY(0); }
      25% { transform: rotateX(90deg) rotateY(180deg) rotateZ(45deg) translateY(-20px); }
      50% { transform: rotateX(180deg) rotateY(360deg) rotateZ(90deg) translateY(0); }
      75% { transform: rotateX(270deg) rotateY(540deg) rotateZ(135deg) translateY(-20px); }
      100% { transform: rotateX(360deg) rotateY(720deg) rotateZ(180deg) translateY(0); }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body>
  <div id="stars"></div>
  <div class="scanlines"></div>
  <div id="root"></div>
  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 300; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 100}%`;
      star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
