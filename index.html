<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Dr Richard Barker - The Collaborative Science Environment (www.cosecloud.com)">
  <meta name="description" content="Lunar & Martian Frontier - a sandbox colony builder on the Moon. Created by Dr Richard Barker for The Collaborative Science Environment.">
  <title>Lunar & Martian Frontier</title>
</head>
<body>
  <div id="stars"></div>
  <div id="earth"></div>
  <div class="scanlines"></div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 300; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 100}%`;
      star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
